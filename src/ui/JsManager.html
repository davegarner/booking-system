<script>
  /* JsManager — wires the manager screens. Loaded only on the manager view.
     Phase 3 covers the Closures tab (company closures, per-employee time off,
     conflicts). Later phases extend this file for Schedule/Book/Reports.
     Uses shared helpers from JsCommon. */
  (function () {
    var root = document.getElementById('managerView');
    if (!root) return;

    var today = new Date();

    /* ----- company closures ----- */
    function loadClosures() {
      gcall('getClosures').then(function (items) {
        var ul = $id('clList'); ul.innerHTML = '';
        if (!items.length) { ul.innerHTML = '<li class="empty">No upcoming closures.</li>'; return; }
        items.forEach(function (c) {
          var li = document.createElement('li');
          var w = document.createElement('div');
          var d = document.createElement('div'); d.className = 'desc'; d.textContent = c.text; w.appendChild(d);
          if (c.reason) { var s = document.createElement('div'); s.className = 'sub'; s.textContent = c.reason; w.appendChild(s); }
          var b = document.createElement('button');
          b.className = 'btn danger sm'; b.textContent = 'Remove'; b.dataset.closure = c.closureId;
          li.appendChild(w); li.appendChild(b); ul.appendChild(li);
        });
      }).catch(function (e) { toast(errMsg(e), true); });
    }

    $id('clStartDate').value = isoDate(today);
    $id('clEndDate').value = isoDate(today);
    $id('clDate').value = isoDate(today);
    $id('clScope').addEventListener('change', function () { syncSpanFields('cl'); });
    syncSpanFields('cl');

    $id('clAddBtn').addEventListener('click', function () {
      var span = collectSpan('cl');
      if (span.scope === 'FULL_DAY' && !span.startDate) { toast('Choose a start date.', true); return; }
      if (span.scope === 'PARTIAL' && !span.date) { toast('Choose a date.', true); return; }
      busy(this, gcall('addClosure', span))
        .then(function (res) { toast(affMsg('Closure added', res.affected)); $id('clReason').value = ''; loadClosures(); loadConflicts(); })
        .catch(function (e) { toast(errMsg(e), true); });
    });

    $id('clList').addEventListener('click', function (e) {
      var b = e.target.closest ? e.target.closest('.btn.danger') : null;
      if (!b) return;
      if (!window.confirm('Remove this closure?')) return;
      busy(b, gcall('deleteClosure', b.dataset.closure))
        .then(function () { toast('Closure removed.'); loadClosures(); loadConflicts(); })
        .catch(function (err) { toast(errMsg(err), true); });
    });

    /* ----- time off for an employee ----- */
    function loadRosterInto(sel) {
      return gcall('getRoster').then(function (people) {
        sel.innerHTML = '';
        people.forEach(function (p) {
          var o = document.createElement('option');
          o.value = p.userId; o.textContent = p.displayName + (p.role === 'manager' ? ' (manager)' : '');
          sel.appendChild(o);
        });
        return people;
      });
    }
    function loadEtoList() {
      var uid = $val('etoUser'); if (!uid) { $id('etoList').innerHTML = ''; return; }
      gcall('getTimeOff', uid).then(function (items) {
        var ul = $id('etoList'); ul.innerHTML = '';
        if (!items.length) { ul.innerHTML = '<li class="empty">No upcoming time off for this person.</li>'; return; }
        items.forEach(function (t) {
          var li = document.createElement('li');
          var w = document.createElement('div');
          var d = document.createElement('div'); d.className = 'desc'; d.textContent = t.text; w.appendChild(d);
          if (t.reason) { var s = document.createElement('div'); s.className = 'sub'; s.textContent = t.reason; w.appendChild(s); }
          var b = document.createElement('button');
          b.className = 'btn danger sm'; b.textContent = 'Remove'; b.dataset.to = t.timeOffId;
          li.appendChild(w); li.appendChild(b); ul.appendChild(li);
        });
      }).catch(function (e) { toast(errMsg(e), true); });
    }

    $id('etoStartDate').value = isoDate(today);
    $id('etoEndDate').value = isoDate(today);
    $id('etoDate').value = isoDate(today);
    $id('etoScope').addEventListener('change', function () { syncSpanFields('eto'); });
    syncSpanFields('eto');
    loadRosterInto($id('etoUser')).then(loadEtoList).catch(function (e) { toast(errMsg(e), true); });
    $id('etoUser').addEventListener('change', loadEtoList);

    $id('etoAddBtn').addEventListener('click', function () {
      var uid = $val('etoUser');
      if (!uid) { toast('Choose an employee.', true); return; }
      var span = collectSpan('eto');
      if (span.scope === 'FULL_DAY' && !span.startDate) { toast('Choose a start date.', true); return; }
      if (span.scope === 'PARTIAL' && !span.date) { toast('Choose a date.', true); return; }
      busy(this, gcall('addTimeOff', uid, span))
        .then(function (res) { toast(affMsg('Time off added', res.affected)); $id('etoReason').value = ''; loadEtoList(); loadConflicts(); })
        .catch(function (e) { toast(errMsg(e), true); });
    });

    $id('etoList').addEventListener('click', function (e) {
      var b = e.target.closest ? e.target.closest('.btn.danger') : null;
      if (!b) return;
      if (!window.confirm('Remove this time off?')) return;
      busy(b, gcall('deleteTimeOff', $val('etoUser'), b.dataset.to))
        .then(function () { toast('Removed.'); loadEtoList(); loadConflicts(); })
        .catch(function (err) { toast(errMsg(err), true); });
    });

    /* ----- conflicts ----- */
    function loadConflicts() {
      gcall('getFlaggedBookings').then(function (items) {
        var ul = $id('conflictsList'); ul.innerHTML = '';
        if (!items.length) { ul.innerHTML = '<li class="empty">No conflicts. 🎉</li>'; return; }
        items.forEach(function (b) {
          var li = document.createElement('li'); li.className = 'conflict';
          var w = document.createElement('div');
          var d = document.createElement('div'); d.className = 'desc';
          d.textContent = b.when + ' · ' + b.employee + (b.clientName ? ' with ' + b.clientName : '');
          w.appendChild(d);
          var s = document.createElement('div'); s.className = 'sub'; s.textContent = b.flagReason; w.appendChild(s);
          li.appendChild(w); ul.appendChild(li);
        });
      }).catch(function (e) { toast(errMsg(e), true); });
    }
    $id('refreshConflictsBtn').addEventListener('click', loadConflicts);
    document.addEventListener('fsw:bookingsChanged', loadConflicts);

    loadClosures();
    loadConflicts();
  })();
</script>

<script>
  /* JsManager (Schedule + Book) — the combined calendar and the booking form.
     Requires FullCalendar (loaded in Manager.html) and JsCommon helpers. */
  (function () {
    var root = document.getElementById('managerView');
    if (!root) return;
    var calendar = null;
    var currentBookingId = null;

    function utcDateStr(d) { return d ? d.toISOString().slice(0, 10) : ''; }
    function utcTimeStr(d) { return d ? d.toISOString().slice(11, 16) : ''; }
    function locLabel(v) { return v === 'IN_PERSON' ? 'In person' : v === 'PHONE' ? 'Phone' : v === 'VIDEO' ? 'Video' : v || ''; }
    function escapeHtml(s) {
      return String(s == null ? '' : s).replace(/[&<>"]/g, function (c) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c];
      });
    }
    // Events use naive business-tz times rendered as UTC, so format with UTC getters.
    function fmtDateTime(d) { return d ? d.toLocaleString(undefined, { weekday: 'short', day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit', timeZone: 'UTC' }) : ''; }
    function fmtTime(d) { return d ? d.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit', timeZone: 'UTC' }) : ''; }

    /* ----- schedule calendar ----- */
    function initCalendar() {
      var elc = $id('scheduleCalendar');
      if (!elc || typeof FullCalendar === 'undefined') {
        if (elc) elc.textContent = 'Calendar failed to load (network).';
        return;
      }
      calendar = new FullCalendar.Calendar(elc, {
        initialView: 'timeGridWeek',
        timeZone: 'UTC',                 // events carry naive business-tz wall-clock
        firstDay: 1,
        nowIndicator: true,
        slotMinTime: '07:00:00',
        slotMaxTime: '21:00:00',
        expandRows: true,
        height: 700,
        headerToolbar: { left: 'prev,next today', center: 'title', right: 'timeGridWeek,timeGridDay,dayGridMonth' },
        events: function (info, success, failure) {
          gcall('getCalendarBookings', info.startStr.slice(0, 10), info.endStr.slice(0, 10))
            .then(success)
            .catch(function (e) { failure(e); toast(errMsg(e), true); });
        },
        eventClick: function (arg) { showDetail(arg.event); }
      });
      calendar.render();
    }

    function showDetail(ev) {
      var p = ev.extendedProps || {};
      $id('bmTitle').textContent = p.employee + (p.clientName ? (' with ' + p.clientName) : '');
      var rows = [['When', fmtDateTime(ev.start) + ' – ' + fmtTime(ev.end)]];
      if (p.clientEmail) rows.push(['Client email', p.clientEmail]);
      if (p.clientPhone) rows.push(['Client phone', p.clientPhone]);
      if (p.meetingType) rows.push(['Type', p.meetingType]);
      rows.push(['Format', locLabel(p.locationFormat)]);
      if (p.purposeNotes) rows.push(['Notes', p.purposeNotes]);
      if (p.flag === 'TIMEOFF_CONFLICT') rows.push(['⚠ Conflict', p.flagReason || 'Overlaps time off / closure']);
      $id('bmBody').innerHTML = rows.map(function (r) {
        return '<div class="kv"><span>' + escapeHtml(r[0]) + '</span><b>' + escapeHtml(r[1]) + '</b></div>';
      }).join('');
      currentBookingId = ev.id;
      $id('bmDate').value = utcDateStr(ev.start);
      $id('bmStart').value = utcTimeStr(ev.start);
      $id('bmLen').value = ev.end ? Math.round((ev.end - ev.start) / 60000) : 60;
      $id('bmRescheduleForm').classList.add('hidden');
      $id('bookingModal').hidden = false;
    }
    function closeModal() { $id('bookingModal').hidden = true; }
    $id('bmClose').addEventListener('click', closeModal);
    $id('bookingModal').addEventListener('click', function (e) { if (e.target === this) closeModal(); });

    $id('bmReschedule').addEventListener('click', function () {
      $id('bmRescheduleForm').classList.toggle('hidden');
    });
    $id('bmConfirmReschedule').addEventListener('click', function () {
      if (!currentBookingId) return;
      var payload = { date: $val('bmDate'), startTime: $val('bmStart'), lengthMin: Number($val('bmLen')) };
      busy(this, gcall('rescheduleBooking', currentBookingId, payload)).then(function () {
        toast('Meeting rescheduled.'); closeModal();
        document.dispatchEvent(new Event('fsw:bookingsChanged'));
      }).catch(function (e) { toast(errMsg(e), true); });
    });
    $id('bmCancel').addEventListener('click', function () {
      if (!currentBookingId) return;
      var reason = window.prompt('Reason for cancelling? (optional)');
      if (reason === null) return; // user dismissed
      busy(this, gcall('cancelBooking', currentBookingId, reason)).then(function () {
        toast('Meeting cancelled.'); closeModal();
        document.dispatchEvent(new Event('fsw:bookingsChanged'));
      }).catch(function (e) { toast(errMsg(e), true); });
    });

    document.addEventListener('fsw:bookingsChanged', function () { if (calendar) calendar.refetchEvents(); });

    // Re-fit the calendar when its tab becomes visible (it may have rendered hidden).
    root.addEventListener('click', function (e) {
      var tab = e.target.closest ? e.target.closest('.tab') : null;
      if (tab && tab.getAttribute('data-target') === 'mgr-schedule' && calendar) {
        setTimeout(function () { calendar.updateSize(); }, 60);
      }
    });

    /* ----- booking form ----- */
    function fillBookUser() {
      return gcall('getRoster').then(function (people) {
        var sel = $id('bkUser'); sel.innerHTML = '';
        people.forEach(function (pn) {
          var o = document.createElement('option'); o.value = pn.userId; o.textContent = pn.displayName; sel.appendChild(o);
        });
      });
    }

    $id('bkDate').value = isoDate(new Date());

    $id('bkShowBtn').addEventListener('click', function () {
      var uid = $val('bkUser'), date = $val('bkDate');
      if (!uid || !date) { toast('Choose an employee and date.', true); return; }
      var out = $id('bkSlots'); out.textContent = 'Loading…';
      busy(this, gcall('previewFreeRanges', uid, date, date)).then(function (ranges) {
        out.innerHTML = '';
        if (!ranges.length) { out.innerHTML = '<div class="none">No free time that day.</div>'; return; }
        var hint = document.createElement('div'); hint.className = 'sub'; hint.textContent = 'Free times (click to fill the start):';
        out.appendChild(hint);
        ranges.forEach(function (r) {
          var s = document.createElement('span'); s.className = 'slot clickable';
          s.textContent = r.startText + '–' + r.endText;
          s.addEventListener('click', function () {
            $id('bkStart').value = r.startText;
            var mins = Math.round((r.end - r.start) / 60000);
            $id('bkLen').value = Math.min(mins, 60);
          });
          out.appendChild(s);
        });
      }).catch(function (e) { out.textContent = ''; toast(errMsg(e), true); });
    });

    $id('bkBookBtn').addEventListener('click', function () {
      var payload = {
        userId: $val('bkUser'), date: $val('bkDate'), startTime: $val('bkStart'), lengthMin: Number($val('bkLen')),
        clientName: $val('bkName'), clientEmail: $val('bkEmail'), clientPhone: $val('bkPhone'),
        meetingType: $val('bkType'), locationFormat: $val('bkLoc'), purposeNotes: $val('bkNotes')
      };
      busy(this, gcall('createBooking', payload)).then(function () {
        toast('Meeting booked.');
        ['bkName', 'bkEmail', 'bkPhone', 'bkType', 'bkNotes'].forEach(function (id) { $id(id).value = ''; });
        $id('bkSlots').innerHTML = '';
        document.dispatchEvent(new Event('fsw:bookingsChanged'));
      }).catch(function (e) { toast(errMsg(e), true); });
    });

    fillBookUser().catch(function (e) { toast(errMsg(e), true); });
    initCalendar();
  })();
</script>
