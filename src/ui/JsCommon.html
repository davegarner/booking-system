<script>
  /* JsCommon — shared client helpers and shell wiring. Loaded on every page. */

  /**
   * Promise wrapper around the server call. Usage: gcall('getServerInfo', arg1, ...)
   * Browser / Google Sites: routes through google.script.run (Google session auth).
   * Desktop app (Electron): routes through window.fswApi, which the preload bridges
   * to the JSON API with a verified Google ID token. Same method names and args.
   */
  function gcall(method) {
    var args = Array.prototype.slice.call(arguments, 1);
    if (window.fswApi && typeof window.fswApi.call === 'function') {
      return window.fswApi.call(method, args); // desktop shell
    }
    return new Promise(function (resolve, reject) {
      var runner = google.script.run
        .withSuccessHandler(resolve)
        .withFailureHandler(reject);
      runner[method].apply(runner, args);
    });
  }

  /** Brief toast message. */
  function toast(msg, isError) {
    var el = document.getElementById('toast');
    if (!el) return;
    el.textContent = msg;
    el.classList.toggle('err', !!isError);
    el.hidden = false;
    clearTimeout(toast._t);
    toast._t = setTimeout(function () { el.hidden = true; }, 4000);
  }

  /** Scoped tab switching: a .tab toggles the .panel matching its data-target within its .view. */
  function initTabs() {
    document.addEventListener('click', function (e) {
      var tab = e.target.closest ? e.target.closest('.tab') : null;
      if (!tab) return;
      var view = tab.closest('.view');
      if (!view) return;
      var targetId = tab.getAttribute('data-target');
      view.querySelectorAll('.tab').forEach(function (t) { t.classList.toggle('active', t === tab); });
      view.querySelectorAll('.panel').forEach(function (p) { p.classList.toggle('active', p.id === targetId); });
    });
  }

  /** Populate the top bar from bootstrap. */
  function initChrome() {
    var f = window.FSW || {};
    var brand = document.getElementById('brandName');
    if (brand && f.companyName) brand.textContent = f.companyName;

    var name = document.getElementById('whoName');
    if (name) name.textContent = f.displayName || f.email || '';

    var role = document.getElementById('whoRole');
    if (role) {
      if (f.role) {
        role.textContent = (f.role === 'manager') ? 'Manager' : 'Employee';
        role.classList.add(f.role);
      } else {
        role.textContent = 'No access';
        role.classList.add('none');
      }
      role.hidden = false;
    }

    if (f.notice) {
      var nt = document.getElementById('noticeTitle');
      var nb = document.getElementById('noticeBody');
      if (nt) nt.textContent = f.notice.title;
      if (nb) nb.textContent = f.notice.body;
    }
  }

  /** Confirm the client↔server round-trip and show identity + server time. */
  function checkConnection() {
    var f = window.FSW || {};
    if (f.state !== 'OK') return;
    var cs = document.getElementById('connStatus');
    if (cs) cs.textContent = 'Connecting…';
    gcall('getServerInfo').then(function (info) {
      if (!cs) return;
      cs.innerHTML = '<span class="ok">✓ Connected</span> — signed in as ' + info.email +
        ' (' + (info.role || 'no role') + '). Server time: ' + info.serverTimeText + ' · ' + info.tz + '.';
    }).catch(function (err) {
      if (cs) cs.innerHTML = '<span class="err">⚠ Connection error</span>: ' + (err && err.message ? err.message : err);
    });
  }

  /* ---- shared helpers used by feature scripts (employee/manager) ---- */
  function $id(id) { return document.getElementById(id); }
  function $val(id) { var e = $id(id); return e ? e.value : ''; }
  function errMsg(e) { return (e && e.message) ? e.message : String(e); }

  /** Disable a button while a promise runs; re-enable on settle. */
  function busy(btn, p) {
    btn.disabled = true;
    return p.then(function (r) { btn.disabled = false; return r; },
                  function (e) { btn.disabled = false; throw e; });
  }

  /** Local yyyy-MM-dd for date inputs. */
  function isoDate(d) {
    var m = d.getMonth() + 1, day = d.getDate();
    return d.getFullYear() + '-' + (m < 10 ? '0' : '') + m + '-' + (day < 10 ? '0' : '') + day;
  }

  /** Compose a save message, warning about any newly-flagged bookings. */
  function affMsg(base, affected) {
    if (affected && affected.length) {
      return base + '. ⚠ ' + affected.length + ' existing meeting(s) now conflict and are flagged for review.';
    }
    return base + '.';
  }

  /** Read a full-day/partial "span" form by id prefix p. */
  function collectSpan(p) {
    if ($val(p + 'Scope') === 'FULL_DAY') {
      return { scope: 'FULL_DAY', startDate: $val(p + 'StartDate'), endDate: $val(p + 'EndDate'), reason: $val(p + 'Reason') };
    }
    return { scope: 'PARTIAL', date: $val(p + 'Date'), startTime: $val(p + 'Start'), endTime: $val(p + 'End'), reason: $val(p + 'Reason') };
  }

  /** Show/hide a span form's fields based on its scope select. */
  function syncSpanFields(p) {
    var full = $val(p + 'Scope') === 'FULL_DAY';
    document.querySelectorAll('.' + p + '-full').forEach(function (e) { e.classList.toggle('hidden', !full); });
    document.querySelectorAll('.' + p + '-part').forEach(function (e) { e.classList.toggle('hidden', full); });
  }

  (function init() {
    initChrome();
    initTabs();
    checkConnection();
  })();
</script>
