<style>
  :root {
    --brand: #1a73e8;
    --brand-dark: #1558b0;
    --ink: #202124;
    --muted: #5f6368;
    --line: #dadce0;
    --bg: #f6f8fc;
    --card: #ffffff;
    --ok: #137333;
    --warn: #b06000;
    --err: #c5221f;
    --radius: 10px;
    --shadow: 0 1px 3px rgba(60,64,67,.18), 0 1px 2px rgba(60,64,67,.10);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Google Sans', Roboto, Arial, system-ui, sans-serif;
    color: var(--ink);
    background: var(--bg);
    font-size: 14px;
    line-height: 1.5;
  }

  /* Top bar */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; padding: 10px 18px;
    background: var(--card); border-bottom: 1px solid var(--line);
    position: sticky; top: 0; z-index: 10;
  }
  .brand { font-size: 17px; font-weight: 600; color: var(--brand); }
  .who { display: flex; align-items: center; gap: 10px; }
  .who-name { color: var(--muted); }
  .badge {
    font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .04em;
    padding: 3px 9px; border-radius: 999px; background: #e8f0fe; color: var(--brand-dark);
  }
  .badge.manager { background: #e6f4ea; color: var(--ok); }
  .badge.employee { background: #e8f0fe; color: var(--brand-dark); }
  .badge.none { background: #fce8e6; color: var(--err); }

  /* Layout */
  .container { max-width: 1080px; margin: 0 auto; padding: 18px; }
  .view { display: block; }

  /* Tabs */
  .tabs {
    display: flex; gap: 4px; flex-wrap: wrap;
    border-bottom: 1px solid var(--line); margin-bottom: 18px;
  }
  .tab {
    appearance: none; border: none; background: transparent; cursor: pointer;
    font: inherit; color: var(--muted); padding: 10px 16px; border-radius: 8px 8px 0 0;
    border-bottom: 3px solid transparent; margin-bottom: -1px;
  }
  .tab:hover { background: #f1f3f4; color: var(--ink); }
  .tab.active { color: var(--brand); border-bottom-color: var(--brand); font-weight: 600; }

  /* Panels */
  .panel { display: none; }
  .panel.active { display: block; }

  /* Cards */
  .card {
    background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 22px; margin-bottom: 16px;
  }
  .card h2 { margin: 0 0 8px; font-size: 18px; }
  .card p { margin: 6px 0; color: var(--muted); }
  .placeholder { border-style: dashed; box-shadow: none; background: #fbfdff; }
  .soon {
    display: inline-block; font-size: 12px; font-weight: 600;
    color: var(--warn); background: #fef7e0; padding: 2px 8px; border-radius: 999px;
  }

  /* Notice (setup / unauthorized) */
  .notice-view { max-width: 620px; margin: 48px auto; }
  .notice { text-align: center; }
  .notice h2 { color: var(--ink); }

  /* Status bar */
  .statusbar {
    margin-top: 18px; padding-top: 12px; border-top: 1px solid var(--line);
    font-size: 12px; color: var(--muted);
  }
  .statusbar .ok { color: var(--ok); }
  .statusbar .err { color: var(--err); }

  /* Toast */
  .toast {
    position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%);
    background: #202124; color: #fff; padding: 10px 16px; border-radius: 8px;
    box-shadow: var(--shadow); max-width: 90%; z-index: 50;
  }
  .toast.err { background: var(--err); }

  /* Buttons */
  .btn {
    appearance: none; cursor: pointer; font: inherit; font-weight: 600;
    background: var(--brand); color: #fff; border: 1px solid var(--brand);
    padding: 8px 16px; border-radius: 8px;
  }
  .btn:hover { background: var(--brand-dark); border-color: var(--brand-dark); }
  .btn.ghost { background: transparent; color: var(--brand); }
  .btn.ghost:hover { background: #e8f0fe; }
  .btn.danger { background: transparent; color: var(--err); border-color: transparent; padding: 4px 8px; }
  .btn.danger:hover { background: #fce8e6; }
  .btn.sm { padding: 5px 10px; font-size: 13px; }
  .btn:disabled { opacity: .5; cursor: default; }

  /* Inputs */
  input, select {
    font: inherit; color: var(--ink); background: #fff;
    border: 1px solid var(--line); border-radius: 8px; padding: 7px 9px;
  }
  input:focus, select:focus { outline: 2px solid #c2dbff; border-color: var(--brand); }
  .input-sm { width: 80px; }
  .row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin: 10px 0; }

  /* Add forms */
  .adder { margin-top: 12px; }
  .adder > summary { display: inline-block; list-style: none; }
  .adder > summary::-webkit-details-marker { display: none; }
  .form-grid {
    display: flex; flex-wrap: wrap; gap: 12px 16px; align-items: end;
    margin-top: 14px; padding: 14px; background: #fbfdff; border: 1px solid var(--line); border-radius: 8px;
  }
  .form-grid label { display: flex; flex-direction: column; gap: 4px; font-size: 12px; color: var(--muted); }
  .form-grid label.wide { flex: 1 1 200px; }
  .form-grid label.wide input { width: 100%; }
  .hidden { display: none !important; }

  /* Lists of rules/slots */
  .list { list-style: none; margin: 8px 0 0; padding: 0; }
  .list li {
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    padding: 10px 12px; border: 1px solid var(--line); border-radius: 8px; margin-bottom: 8px; background: #fff;
  }
  .list li .desc { color: var(--ink); }
  .list li .sub { color: var(--muted); font-size: 12px; }
  .list .empty { color: var(--muted); font-style: italic; border-style: dashed; justify-content: center; }
  .list li.conflict { border-left: 4px solid var(--warn); background: #fffaf0; }
  .list li.bk-item { display: block; }
  .bk-item .bk-main { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  .bk-item .actions { display: flex; gap: 6px; flex-shrink: 0; }
  .bk-item .resched-form { margin-top: 12px; }

  /* Preview */
  .preview { margin-top: 12px; }
  .preview .day { margin: 12px 0 4px; font-weight: 600; }
  .preview .slot {
    display: inline-block; margin: 3px 6px 3px 0; padding: 4px 10px;
    background: #e6f4ea; color: var(--ok); border-radius: 999px; font-size: 13px;
  }
  .preview .none { color: var(--muted); font-style: italic; }
  .slot.clickable { cursor: pointer; }
  .slot.clickable:hover { background: #cde9d6; }

  /* Modal */
  .overlay {
    position: fixed; inset: 0; background: rgba(32,33,36,.5);
    display: flex; align-items: center; justify-content: center; z-index: 60; padding: 16px;
  }
  .overlay[hidden] { display: none; }
  .modal-card {
    background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow);
    padding: 22px; width: 100%; max-width: 440px;
  }
  .modal-card h3 { margin: 0 0 12px; }
  .kv { display: flex; justify-content: space-between; gap: 16px; padding: 5px 0; border-bottom: 1px solid #f0f1f3; }
  .kv span { color: var(--muted); }
  .kv b { text-align: right; }

  /* Reports */
  table.report { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
  table.report th, table.report td { text-align: left; padding: 6px 8px; border-bottom: 1px solid var(--line); }
  table.report th { color: var(--muted); font-weight: 600; }
  .bar { display: inline-block; vertical-align: middle; width: 110px; height: 10px; background: #eef1f4; border-radius: 6px; overflow: hidden; }
  .bar-fill { display: block; height: 100%; background: var(--brand); }

  /* FullCalendar flagged events */
  .fc-event.flagged { outline: 2px solid var(--warn); outline-offset: -2px; }
  #scheduleCalendar { margin-top: 12px; }
  .fc { font-size: 13px; }

  @media (max-width: 600px) {
    .container { padding: 12px; }
    .who-name { display: none; }
    .list li { flex-direction: column; align-items: flex-start; }
  }
</style>
